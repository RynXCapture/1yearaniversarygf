<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rose Énigme</title>

<!-- Polices cute -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Quicksand', sans-serif;
    text-align: center;
    color: white;
    overflow-x: hidden;
    padding: 10px;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('background.jpeg') center / cover no-repeat;
    filter: blur(12px);
    transform: scale(1.1);
    z-index: -3;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(255,182,193,0.5), rgba(255,105,180,0.4));
    z-index: -2;
}

/* CONTENU */
.content {
    position: relative;
    z-index: 1;
    padding-top: 20px;
}

/* TITRE */
h1 {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    margin-bottom: 15px;
    color: #fff0f5;
}

/* INPUT */
input {
    padding: 14px;
    width: 90%;
    max-width: 400px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 10px;
}

/* BOUTON */
button {
    width: 90%;
    max-width: 400px;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: #ff69b4;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ff85c1;
}

/* CONTAINER */
.container {
    position: relative;
    width: 90%;
    max-width: 400px;
    margin: 30px auto;
}

/* FLEUR */
.flower {
    width: 100%;
}

/* ZONES */
.zone {
    position: absolute;
    width: 22%;
    height: 22%;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    transition: 0.3s;
    -webkit-tap-highlight-color: transparent;
}

.zone:hover {
    transform: scale(1.1);
}

/* POSITIONS */
.z1 { top: -5%; left: 39%; }
.z2 { top: 28%; right: -5%; }
.z3 { bottom: -5%; right: 18%; }
.z4 { bottom: -5%; left: 18%; }
.z5 { top: 28%; left: -5%; }

/* ENIGME */
#enigmeBox {
    margin-top: 15px;
    font-size: 16px;
    padding: 0 10px;
}

/* RESULT */
#result {
    display: none;
    margin-top: 30px;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

/* TEXTE */
#result p {
    font-size: 14px;
    line-height: 1.6;
    padding: 10px;
}

/* GALERIE */
.gallery {
    max-width: 100%;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
}

.gallery img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="content">

<h1>Résous les énigmes 💗</h1>

<input type="text" id="phrase" placeholder="Entre la phrase...">
<button onclick="checkPhrase()">Valider</button>

<div class="container">

<img src="flower.png" class="flower">

<div class="zone z1" onclick="showEnigme(0)">1</div>
<div class="zone z2" onclick="showEnigme(1)">2</div>
<div class="zone z3" onclick="showEnigme(2)">3</div>
<div class="zone z4" onclick="showEnigme(3)">4</div>
<div class="zone z5" onclick="showEnigme(4)">5</div>

</div>

<div id="enigmeBox">Clique sur un pétale 🌸</div>

<div id="result">
<h2>💖 Bravo 💖</h2>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
<img src="photo4.jpeg">
<img src="photo5.jpeg">
<img src="photo6.jpeg">
<img src="photo7.jpeg">
<img src="photo8.jpeg">
<img src="photo9.jpeg">
</div>

<p>
« Toda panela tem sua tampa » 💗<br><br>
Mon Amour, chaque jour avec toi me fait grandir...<br>
Je veux être là pour toi, toujours.<br><br>
Joyeuse première année ensemble ❤️<br>
Je t’aime.
</p>

</div>

</div>

<script>
const enigmes = [
"Je signifie 'tout' en portugais",
"Objet de cuisine pour cuire",
"Verbe 'avoir' en portugais (3 lettres)",
"Mot possessif (à toi / à lui)",
"Ferme une casserole"
];

function showEnigme(index) {
    document.getElementById("enigmeBox").innerText = enigmes[index];
}

/* Vérification améliorée */
function checkPhrase() {
    let input = document.getElementById("phrase").value
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();

    if (input.includes("toda panela tem sua tampa")) {
        document.getElementById("result").style.display = "block";
    } else {
        alert("Ce n'est pas la bonne phrase...");
    }
}
</script>

</body>
</html>
